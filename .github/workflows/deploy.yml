name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy (production)
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    # GitHub Actions no permite el contexto `secrets` directamente dentro de
    # ninguna expresión `if:` (ni de job ni de step). El patrón soportado es
    # volcar el secret a una variable de entorno del job y comprobar esa
    # variable (`env.*`) en el `if:` de cada step — así los steps se saltan
    # limpiamente mientras el repositorio no tenga el token configurado, en
    # vez de fallar en rojo.
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        if: ${{ env.VERCEL_TOKEN != '' }}
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ env.VERCEL_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build project artifacts
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy to Vercel
        id: deploy
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: |
          url=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "url=$url" >> "$GITHUB_OUTPUT"
